# Web admin + JMAP routing.
#
# :443 is forwarded as raw TCP (TCPRoute) to Stalwart, which terminates web TLS
# itself — exactly like the IMAP/SMTP/POP3 TLS ports. Envoy stays pure L4 for
# ALL of Stalwart's traffic. We deliberately do NOT use a TLS/TLSRoute listener:
# Envoy's SNI inspection on TLS-passthrough was resetting the :443 handshake
# ("unexpected eof while reading"); a plain TCPRoute avoids that and is
# consistent with the mail ports.
#
# The :80 HTTP listener carries (a) cert-manager's ACME HTTP-01 challenge —
# its solver injects a temporary HTTPRoute for /.well-known/acme-challenge/*
# that takes precedence — and (b) the HTTP->HTTPS redirect below.
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: stalwart-web
  namespace: stalwart
spec:
  parentRefs:
    - name: stalwart-gateway
      sectionName: https
  rules:
    - backendRefs:
        - name: stalwart
          port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stalwart-http-redirect
  namespace: stalwart
spec:
  parentRefs:
    - name: stalwart-gateway
      sectionName: http
  hostnames: ["mail.parlour-world.io"]
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
