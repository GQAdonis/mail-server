# Envoy Gateway GatewayClass. Assumes Envoy Gateway is already installed in the
# cluster (helm install eg oci://docker.io/envoyproxy/gateway-helm -n
# envoy-gateway-system). The controllerName below is Envoy Gateway's fixed value.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: stalwart-eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
