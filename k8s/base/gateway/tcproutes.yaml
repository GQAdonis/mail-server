# One TCPRoute per mail port. Each attaches to the matching named TCP listener
# on the Gateway via sectionName (verified Envoy Gateway pattern), and forwards
# the raw stream to the stalwart Service. TLS is terminated by Stalwart.
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata: { name: stalwart-smtp, namespace: stalwart }
spec:
  parentRefs: [{ name: stalwart-gateway, sectionName: smtp }]
  rules: [{ backendRefs: [{ name: stalwart, port: 25 }] }]
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata: { name: stalwart-submissions, namespace: stalwart }
spec:
  parentRefs: [{ name: stalwart-gateway, sectionName: submissions }]
  rules: [{ backendRefs: [{ name: stalwart, port: 465 }] }]
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata: { name: stalwart-submission, namespace: stalwart }
spec:
  parentRefs: [{ name: stalwart-gateway, sectionName: submission }]
  rules: [{ backendRefs: [{ name: stalwart, port: 587 }] }]
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata: { name: stalwart-imaps, namespace: stalwart }
spec:
  parentRefs: [{ name: stalwart-gateway, sectionName: imaps }]
  rules: [{ backendRefs: [{ name: stalwart, port: 993 }] }]
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata: { name: stalwart-imap, namespace: stalwart }
spec:
  parentRefs: [{ name: stalwart-gateway, sectionName: imap }]
  rules: [{ backendRefs: [{ name: stalwart, port: 143 }] }]
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata: { name: stalwart-pop3s, namespace: stalwart }
spec:
  parentRefs: [{ name: stalwart-gateway, sectionName: pop3s }]
  rules: [{ backendRefs: [{ name: stalwart, port: 995 }] }]
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata: { name: stalwart-pop3, namespace: stalwart }
spec:
  parentRefs: [{ name: stalwart-gateway, sectionName: pop3 }]
  rules: [{ backendRefs: [{ name: stalwart, port: 110 }] }]
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata: { name: stalwart-managesieve, namespace: stalwart }
spec:
  parentRefs: [{ name: stalwart-gateway, sectionName: managesieve }]
  rules: [{ backendRefs: [{ name: stalwart, port: 4190 }] }]
