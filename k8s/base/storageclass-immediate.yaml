# Immediate-binding StorageClass.
#
# GKE's default `standard-rwo` / `premium-rwo` use volumeBindingMode:
# WaitForFirstConsumer, which delays PV provisioning until a consuming Pod is
# scheduled. The requirement here is IMMEDIATE binding, so PVs are provisioned
# as soon as the PVC is created (independent of Pod scheduling).
#
# Trade-off: with Immediate binding the PD is created before the scheduler
# picks a zone, so the scheduler is then constrained to the PD's zone. For a
# single-zone mail server (Postgres StatefulSet + Stalwart config volume) this
# is the desired behavior.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: stalwart-immediate
provisioner: pd.csi.storage.gke.io
parameters:
  # pd-standard (HDD) draws from the DISKS_TOTAL_GB quota, which has ample
  # headroom in this cluster; pd-balanced/pd-ssd would hit the saturated
  # regional SSD_TOTAL_GB quota. For a mail server's metadata + blob storage,
  # standard disks are an acceptable price/perf trade-off.
  type: pd-standard
volumeBindingMode: Immediate
allowVolumeExpansion: true
reclaimPolicy: Retain
