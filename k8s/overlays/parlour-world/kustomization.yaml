apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Pin the Stalwart image to a real tag/digest for production.
images:
  - name: stalwartlabs/stalwart
    newTag: v0.16.10

# --- Bootstrap config --------------------------------------------------------
# Regenerate the stalwart-bootstrap ConfigMap from this overlay's own copy of
# the JSON (config-bootstrap.json here). This deploy uses a FileSystem blob
# store on the data PVC (the provided GCP service account lacks
# storage.hmacKeys.create, so GCS S3-interop keys can't be minted yet). The GCS
# bucket gs://parlour-world-mail-blobs is created and ready for a later
# migration to the S3 blob store once HMAC keys are available.
# `behavior: replace` overrides the base configMapGenerator of the same name.
configMapGenerator:
  - name: stalwart-bootstrap
    behavior: replace
    files:
      - config.json=config-bootstrap.json

patches:
  # Blobs live on the data PVC now (FileSystem blob store) — enlarge it.
  - target:
      kind: StatefulSet
      name: stalwart
    patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/1/spec/resources/requests/storage
        value: 40Gi
  # First-run access: enable recovery mode so admin:<password> (from the
  # stalwart-runtime secret) can log in to the web UI to complete setup.
  # Once setup is done and a real admin account exists, remove this patch
  # and STALWART_RECOVERY_ADMIN from the secret, then roll the pod.
  - target:
      kind: StatefulSet
      name: stalwart
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STALWART_RECOVERY_MODE
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STALWART_RECOVERY_ADMIN
          valueFrom:
            secretKeyRef:
              name: stalwart-runtime
              key: STALWART_RECOVERY_ADMIN

# --- Secrets -----------------------------------------------------------------
# Provide real values via these env files (gitignored — see k8s/.gitignore), or
# replace these generators with an ExternalSecret / sealed-secret in your GitOps
# pipeline. The keys must match what the manifests reference.
secretGenerator:
  - name: stalwart-postgres
    behavior: replace
    envs:
      - secrets/postgres.env       # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
  - name: stalwart-runtime
    behavior: replace
    envs:
      - secrets/runtime.env        # STALWART_PG_PASSWORD / STALWART_GCS_SECRET_KEY
